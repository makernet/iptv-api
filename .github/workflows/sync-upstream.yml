name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *' # 每天 00:00 UTC 运行
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出你的 Fork 仓库
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 配置 Git 用户信息
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 添加上游仓库
        run: |
          git remote add upstream https://github.com/Guovin/iptv-api.git  # 这里改为你的上游仓库
          git fetch upstream
          git checkout master # 这里改为你的上游主要分支，一般可能是main或者master
          git merge upstream/master --allow-unrelated-histories # 合并上游的 master 分支，一般可能是main或者master
          git checkout --theirs <conflicted-file>  # 针对每个冲突文件，使用上游版本覆盖
          git add <conflicted-file>  # 标记冲突文件已解决
          git commit -m "Merge upstream/master with unrelated histories 强制合并上游仓库覆盖本仓库"  # 提交合并结果

      - name: 推送到 Fork 仓库
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin master --force # 这里改为你的上游主要分支，一般可能是main或者master
